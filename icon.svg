<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ff3045"/>
      <stop offset="100%" stop-color="#b00020"/>
    </linearGradient>

    <radialGradient id="glow">
      <stop offset="0%" stop-color="#ff6b7a" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#ff6b7a" stop-opacity="0"/>
    </radialGradient>

    <filter id="shadow">
      <feDropShadow dx="0" dy="10" stdDeviation="15" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Outer Background -->
  <rect width="512" height="512" rx="120" fill="#050505"/>

  <!-- Main Card -->
  <rect x="40" y="40" width="432" height="432" rx="96"
        fill="url(#bg)" filter="url(#shadow)"/>

  <!-- Center Glow -->
  <circle cx="256" cy="256" r="120" fill="url(#glow)"/>

  <!-- Glass Highlight -->
  <path d="M80 80 C170 50 320 50 432 120"
        stroke="#fff"
        stroke-opacity="0.18"
        stroke-width="16"
        fill="none"
        stroke-linecap="round"/>

  <!-- Perfectly Centered Music Note -->
  <text x="256"
        y="305"
        text-anchor="middle"
        font-size="210"
        font-family="Arial, sans-serif"
        font-weight="700"
        fill="#ffffff">♪</text>

</svg>