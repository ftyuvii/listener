<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>App Updates & Announcements</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="app-shell">
    <div class="view pos-center">
      
      <div class="sub-header">
        <button class="back-btn" onclick="window.history.back()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <line x1="19" y1="12" x2="5" y2="12"></line>
            <polyline points="12 19 5 12 12 5"></polyline>
          </svg>
        </button>
        <span class="brand-title" style="font-size: 1.15rem; margin-left: 4px;">System <span>Announcements</span></span>
      </div>

      <div class="scroll-body" style="padding-top: 12px;">
        
        <div class="announcements-container" id="announcement-feed">
          </div>

        <div class="bottom-spacer"></div>
      </div>

    </div>
  </div>

  <script>
    // ADMIN DATA STORE: Naye updates bina purane delete kiye top par push karte jao
    const announcementsData = [
      {
        id: 3,
        title: "Free Fire Tourney Engine v2.0",
        desc: "We have fully optimized the live points table generation algorithms for Winter Walkers and Warbound Esports. Custom layouts are now rendering at 60fps.",
        date: "Today, 02:46 PM",
        tag: "SYSTEM UPDATE",
        type: "critical" // options: critical, feature, standard
      },
      {
        id: 2,
        title: "Graphics Pipeline Reconstructed",
        desc: "Removed overlapping assets and introduced premium typography nodes for team logos. Profile syncing with Firebase is now direct and fast.",
        date: "Yesterday",
        tag: "UI OPTIMIZATION",
        type: "feature"
      },
      {
        id: 1,
        title: "Welcome to High-Fidelity App Shell",
        desc: "Initial deployment complete. Integrated red-crimson dark ambient accents, side menu layers, and high-performance glass component overlays.",
        date: "11 July 2026",
        tag: "DEPLOYMENT",
        type: "standard"
      }
    ];

    function loadAnnouncements() {
      const feed = document.getElementById('announcement-feed');
      feed.innerHTML = '';

      if (announcementsData.length === 0) {
        feed.innerHTML = `<div class="no-results">No recent updates published by admin.</div>`;
        return;
      }

      announcementsData.forEach(item => {
        const card = document.createElement('div');
        card.className = `announcement-card ${item.type}`;
        
        card.innerHTML = `
          <div class="announcement-meta-row">
            <span class="announcement-badge">${item.tag}</span>
            <span class="announcement-date">${item.date}</span>
          </div>
          <h2 class="announcement-title">${item.title}</h2>
          <p class="announcement-desc">${item.desc}</p>
        `;
        
        feed.appendChild(card);
      });
    }

    document.addEventListener('DOMContentLoaded', loadAnnouncements);
  </script>
</body>
</html>
