<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>About Us</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@500;600;700;800&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../src/style.css">
<script src="https://unpkg.com/lucide@latest" defer></script>
<style>
html, body {
  height: auto;
  min-height: 100%;
  width: 100%;
  overflow-y: auto;
  display: block;
  -webkit-overflow-scrolling: touch;
  overscroll-behavior-y: contain;
}
body { background: var(--bg); }
</style>
</head>
<body>

<div class="frame-page-body">
  <div class="about-hero">
    <div class="about-photo-ring" id="about-photo-trigger">
      <img id="about-photo" src="" alt="">
      <div class="about-photo-edit"><i data-lucide="pencil"></i></div>
    </div>
    <input type="file" accept="image/*" id="about-photo-input" class="about-photo-input">
    <div class="about-name" id="about-name">Your Name</div>
    <div class="about-role" id="about-role">Founder &amp; Curator, Restify</div>
    <p class="about-bio" id="about-bio">Tell people who you are. Edit the PROFILE object at the top of this file to update your name, role, bio, and links.</p>
    <div class="about-socials" id="about-socials"></div>
  </div>

  <div class="about-section">
    <div class="about-section-title">What I'm into</div>
    <div class="about-chip-row" id="about-chips"></div>
  </div>

  <div class="about-section">
    <div class="about-section-title">Restify at a glance</div>
    <div class="about-stat-grid" id="about-stats"></div>
  </div>
</div>

<script>
const PROFILE = {
  name: 'Your Name',
  role: 'Founder & Curator, Restify',
  bio: 'Building Restify as a smooth, ad-free listening experience. Edit this bio anytime to share who you are and what you love about music.',
  photo: '',
  interests: ['Lo-fi', 'Indie', 'Production', 'Playlist curation'],
  stats: [
    { value: '4', label: 'Pages' },
    { value: '0', label: 'Ads' },
    { value: '∞', label: 'Songs' }
  ],
  socials: [
    { label: 'Instagram', icon: 'instagram', url: '#' },
    { label: 'GitHub', icon: 'github', url: '#' },
    { label: 'Email', icon: 'mail', url: 'mailto:hello@example.com' }
  ]
};

const PHOTO_KEY = 'restify_about_photo';

function loadStoredPhoto() {
  try { return localStorage.getItem(PHOTO_KEY) || ''; } catch (e) { return ''; }
}

function render() {
  document.getElementById('about-name').textContent = PROFILE.name;
  document.getElementById('about-role').textContent = PROFILE.role;
  document.getElementById('about-bio').textContent = PROFILE.bio;

  const storedPhoto = loadStoredPhoto();
  const photo = storedPhoto || PROFILE.photo;
  const img = document.getElementById('about-photo');
  if (photo) {
    img.src = photo;
  } else {
    img.src = 'https://api.dicebear.com/7.x/shapes/svg?seed=' + encodeURIComponent(PROFILE.name);
  }

  document.getElementById('about-socials').innerHTML = PROFILE.socials.map(s => `
    <a class="about-social-btn" href="${s.url}" target="_blank" rel="noopener">
      <i data-lucide="${s.icon}"></i>
      <span>${s.label}</span>
    </a>
  `).join('');

  document.getElementById('about-chips').innerHTML = PROFILE.interests.map(i => `
    <div class="about-chip">${i}</div>
  `).join('');

  document.getElementById('about-stats').innerHTML = PROFILE.stats.map(s => `
    <div class="about-stat-card">
      <div class="about-stat-value">${s.value}</div>
      <div class="about-stat-label">${s.label}</div>
    </div>
  `).join('');

  if (window.lucide) lucide.createIcons();
}

document.getElementById('about-photo-trigger').addEventListener('click', () => {
  document.getElementById('about-photo-input').click();
});

document.getElementById('about-photo-input').addEventListener('change', e => {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = () => {
    try { localStorage.setItem(PHOTO_KEY, reader.result); } catch (e) {}
    document.getElementById('about-photo').src = reader.result;
  };
  reader.readAsDataURL(file);
});

render();
document.addEventListener('DOMContentLoaded', () => { if (window.lucide) lucide.createIcons(); });
</script>

</body>
</html>
