<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Explore Albums</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@500;600;700;800&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../src/style.css">
<script src="https://unpkg.com/lucide@latest" defer></script>
<style>
html, body {
  height: auto;
  min-height: 100%;
  width: 100%;
  overflow-y: auto;
  display: block;
  -webkit-overflow-scrolling: touch;
  overscroll-behavior-y: contain;
}
body { background: var(--bg); }
</style>
</head>
<body>

<div class="frame-page-body">
  <div class="frame-intro">
    <h1>Explore Albums</h1>
    <p>Browse every album on Restify in one clean grid. Tap a cover to open it and start listening.</p>
  </div>

  <div class="albums-showcase-container" style="margin-top:0;padding-left:20px;padding-right:20px;">
    <div class="modern-albums-mesh" id="albums-mesh"></div>
    <div class="frame-empty" id="albums-empty" style="display:none;">
      <i data-lucide="disc-3"></i>
      <div>No albums yet. New uploads to the Supabase songs bucket will appear here automatically.</div>
    </div>
  </div>
</div>

<script src="../data/albums-controller.js"></script>

</body>
</html>
